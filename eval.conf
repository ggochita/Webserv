server {
    listen 8080;
    host 127.0.0.1;
    server_name first.com;
    client_max_body_size 100; # Very small for testing
    error_page 404 /404.html;


    location /secret {
        root /tmp/hidden_folder; 
        allow_methods GET;
        autoindex on;
    }

    location / {
        root /tmp/www;
        index index.html;
        allow_methods GET;
    }

    location /uploads {
        root /tmp/www/uploads;
        allow_methods POST GET DELETE;
        upload_store /tmp/www/uploads;
        autoindex on;
    }

    location /cgi-bin {
        root /tmp/www/cgi-bin;
        allow_methods GET POST;
        index index.py;
        cgi_extension .py; # Or however your config handles CGI paths
        cgi_path /usr/bin/python3;
    }
}

server {
    listen 8081;
    host 127.0.0.1;
    server_name second.com;
    client_max_body_size 1000000;

    location / {
        root /tmp/www_site2;
        autoindex on;
        allow_methods GET;
        index index.html;
    }
}